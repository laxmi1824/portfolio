<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foodie place</title>
    <link rel="stylesheet" href="food.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />">
</head>
    <style>
*{
    margin: 0;
    padding: 0;
    font-family: sans-serif;
    box-sizing: border-box;

}
h1{
    text-align: center;
    color: green;
    padding: 20px;
}
nav{
    background-color: lime;
    display: grid;
    place-items: center;
}
nav ul{
    list-style-type: none;

}
nav ul a{
    display: inline-block;
    padding: 20px;
    text-decoration: none;
    color: #000;
    transition: 0.2s ease-in;
    font-size: 18px;
}
nav ul a:hover{
    background-color: green;
    color: white;
}
.items{
    /* display: flex;
     flex-direction: row;
     justify-content: space-evenly;*/
     display: grid;
     grid-template-columns: repeat(3, 1fr);
     padding: 30px 20px;
     column-gap: 20px;
     row-gap: 30px;
}
.container img{
    width: 100%;
    height: 300px;
    object-fit: cover;
    cursor: pointer;
    transition: 1s;
    border: 2px solid #ff3d0036;
    border-radius: 13px;
    box-shadow: 4px 7px 7px 0px #00000042;
}
.container img:hover{
    filter: contrast(100%);
    transform: scale(1.05);
     z-index: 2;
}
.container h4{
    padding: 5px;
    text-align: center;
}
.container button{
    padding: 5px 30px;
    border: none;
    outline: none;
    background-color: green;
    color: white;
    cursor: pointer;
    border-radius: 4px;
    font-size: 20px;
    display: block;
    margin: 0 auto;
    transition: 1s all;

}
.container button:hover{
    transform: scale(1.04);
}

#footer{
    background-color: #111;
}
.footercontainer{
    width: 100%;
    padding: 70px 30px 20px;
}
.socialIcons{
    display: flex;
    justify-content: center;
}
.socialIcons a{
    text-decoration: none;
    padding-left: 50px;
    padding: 10px;
    background-color: white;
    margin: 10px;
    align-items: center;
    border-radius: 50%;
}
.socialIcons a i{
    font-size: 2em;
    color: black;
    opacity: 0.9;
    align-items: center;
}
.socialIcons a:hover{
    background-color: #111;
    transition: 0.5s;
}
.socialIcons a:hover i{
    color: white;
    transition: 0.5s;
}
.footernav{
    margin: 30px 0;
}
.footernav ul{
    display: flex;
    justify-content: center;
    list-style-type: none;
}
.footernav ul li a{
    color: white;
    margin: 20px;
    text-decoration: none;
    font-size: 1.3em;
    opacity: 0.7;
    transition: 0.5s;
    text-align: center;
}
.footernav ul li a:hover{
    opacity: 1;
}
.footerbottom{
    background-color: #000;
    padding: 20px;
    text-align: center;
}
.footerbottom p{
    color: white;
}
    </style>
</head>
<body>
    <h1>Foodie place</h1>
    <nav>
        <ul>
            <a href="#"><li>Home</li></a>
            <a href="#"><li>Order</li></a>
            <a href="#"><li>Near</li></a>
            <a href="#"><li>About us</li></a>
        </ul>
    </nav>
    <section class="items">
        <div class="container">
            <img src="https://c4.wallpaperflare.com/wallpaper/234/543/684/food-pizza-wallpaper-preview.jpg" alt="">
            <h4>Pizza</h4>
            <button>Order</button>

        </div>
        <div class="container">
            <img src="https://thumbs.dreamstime.com/b/ham-veg-pizza-salami-pizza-back-38320413.jpg" alt="">
            <h4>Pizza veg</h4>
            <button>Order</button>

        </div>
        <div class="container">
            <img src="https://www.recipetineats.com/wp-content/uploads/2022/08/Stack-of-cheeseburgers.jpg" alt="">
            <h4>burger</h4>
            <button>Order</button>

        </div>
        <div class="container">
            <img src="https://www.seriouseats.com/thmb/_c-xbP-tch4dpSTxKE1zY16sHo8=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/20231204-SEA-VeganBurger-FredHardy-00-dbf603c78b694bfd99489b85ab44f4c4.jpg" alt="">
            <h4>burger veg</h4>
            <button>Order</button>

        </div>
        <div class="container">
            <img src="https://www.indianhealthyrecipes.com/wp-content/uploads/2023/05/red-sauce-pasta-recipe.jpg" alt="">
            <h4>pasta</h4>
            <button>Order</button>

        </div>
        <div class="container">
            <img src="https://www.gimmesomeoven.com/wp-content/uploads/2017/02/Balsamic-Veggie-Pasta-Recipe-2-2.jpg" alt="">
            <h4>pasta veg</h4>
            <button>Order</button>

        </div>
        <div class="container">
            <img src="https://neurosciencenews.com/files/2023/06/coffee-brain-caffeine-neuroscincces.jpg" alt="">
            <h4>coffe</h4>
            <button>Order</button>

        </div>
        <div class="container">
            <img src="https://www.tasteofhome.com/wp-content/uploads/2019/06/juices-shutterstock_121270552.jpg?fit=1024,640" alt="">
            <h4>juice</h4>
            <button>Order</button>

        </div>
    </section>

    <section id="footer">
       
        <div class="footercontainer">
           
            <div class="socialIcons">
                <a href=""><i class="fa-brands fa-facebook"></i></a>
                <a href=""><i class="fa-brands fa-instagram"></i></a>
                <a href=""><i class="fa-brands fa-linkedin"></i></a>
                <a href=""><i class="fa-brands fa-twitter"></i></a>
                <a href=""><i class="fa-brands fa-github"></i></a>
            </div>
            <div class="footernav">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Order</a></li>
                    <li><a href="#">Near</a></li>
                    <li><a href="#">About us</a></li>
                </ul>
            </div>
        </div>
        <div class="footerbottom">
            <p>Copyright &copy;2023 FOODIE PLACE</p>
        </div>
    </section>
</body>
</html>
