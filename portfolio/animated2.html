<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Smiley Face</title>
    <link rel="stylesheet" href="styles.css">
    <style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f0f0f0;
    margin: 0;
}

.smiley {
    position: relative;
    width: 200px;
    height: 200px;
    background-color: #ffeb3b;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    overflow: hidden;
}

.eye {
    position: absolute;
    width: 30px;
    height: 30px;
    background-color: #fff;
    border-radius: 50%;
    top: 50px;
}

.eye.left {
    left: 50px;
}

.eye.right {
    right: 50px;
}

.pupil {
    position: absolute;
    width: 15px;
    height: 15px;
    background-color: #000;
    border-radius: 50%;
    top: 7px;
    left: 7px;
}

.eyebrow {
    position: absolute;
    width: 50px;
    height: 10px;
    background-color: #000;
    border-radius: 20px;
    top: 30px;
}

.eyebrow.left {
    left: 35px;
    transform: rotate(-15deg);
}

.eyebrow.right {
    right: 35px;
    transform: rotate(15deg);
}

.cheek {
    position: absolute;
    width: 30px;
    height: 30px;
    background-color: #ff8a80;
    border-radius: 50%;
    bottom: 70px;
}

.cheek.left {
    left: 20px;
}

.cheek.right {
    right: 20px;
}

.mouth {
    position: absolute;
    bottom: 40px;
    left: 50%;
    width: 120px;
    height: 80px;
    background: linear-gradient(to bottom, #e64a19 0%, #ff8a65 100%);
    border-radius: 0 0 60px 60px;
    transform: translateX(-50%);
    overflow: hidden;
}

.tongue {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 60px;
    height: 40px;
    background-color: #ff8a80;
    border-radius: 30px 30px 0 0;
    transform: translateX(-50%);
}



    </style>
</head>
<body>
    <div class="smiley">
        <div class="eye left">
            <div class="pupil"></div>
        </div>
        <div class="eye right">
            <div class="pupil"></div>
        </div>
        <div class="eyebrow left"></div>
        <div class="eyebrow right"></div>
        <div class="cheek left"></div>
        <div class="cheek right"></div>
        <div class="mouth">
            <div class="tongue"></div>
        </div>
    </div>
</body>
</html>
