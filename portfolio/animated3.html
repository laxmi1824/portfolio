<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0%;
            margin: 0;
            box-sizing: border-box;
        }
        html{
            font-size: 62.5%;
        }
        body{
            height: 100vh;
            display: grid;
            place-items: center;
            background-color: #191825;
        }
        .cradle{
            width: 400px;
            height: 400px;
            background-color: transparent;
            border-top: 2rem solid #663ce3;
            border-radius: 0.5rem;
            display: flex;
           /* justify-content: space-around;*/
           justify-content: center;
           gap: 4.55rem;
        }

        div{
            width: 0.5rem;
            height: 20rem;
            background-color: #663ce3;
            position: relative;
        }

       .cradle div::before{
            content: "";
            position: absolute;
           /* bottom: 0;*/
            left: -2.25rem;
            top: 90%;
            width: 5rem;
            aspect-ratio: 1;
            border-radius: 50%;
            background-color: #663ce3;
        }

        .cradle div:first-child{
            animation: left-swing 2s linear infinite;
            transform-origin: top left;

        }
        .cradle div:last-child{
            animation: right-swing 2s linear 1s infinite;
            transform-origin: top right;

        }

        @keyframes left-swing{
            0%{
                rotate: 0deg;
            }
            25%{
                rotate: 30deg;
            }
            50%{
                rotate: 0deg;
            }
            100%{
                rotate: 0deg;
            }
        }

        @keyframes right-swing{
            0%{
                rotate: 0deg;
            }
            25%{
                rotate: -30deg;
            }
            50%{
                rotate: 0deg;
            }
            100%{
                rotate: 0deg;
            }
        }
    </style>
</head>
<body>
    <div class="cradle">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>
</html>
