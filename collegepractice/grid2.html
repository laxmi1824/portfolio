<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        background-color: darkorchid;
        display: grid;
        grid-template-rows: auto auto;
        text-align: center;
        border: 2px solid black;
        grid-template-columns: auto auto ;
       
    }
    .box1{
        background-color: rgb(8, 28, 91);
         border: 2px solid rgb(30, 133, 81);
         grid-column: 1/span2;
         grid-row: 1;
    }
    .box2{
        grid-column: 1/span2;
        grid-row: 3;
        border: 2px solid black;
        background-color: rgb(218, 215, 21);
       
    
   }
   .box3{
    border: 2px solid black;
    background-color: rgb(229, 98, 98);
   
   }
  .box4{
    background-color: rgb(23, 193, 208);
    border: 2px solid black;
   
   }
   .box5{
    background-color: rgb(241, 168, 59);
    border: 2px solid rgb(132, 113, 114);
    
   
   }
</style>
<body>
    <div class="container">
        <div class="box1">1</div>
        <div class="box2">2</div>
        <div class="box3">3</div>
        <div class="box4">4</div>
        <div class="box5">5</div>
       
    </div>
</body>
</html>
