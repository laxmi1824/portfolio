<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fontawesome.com/icons/heart?f=classic&s=solid">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />">
    <link rel="stylesheet" href="cal.css">
    <title>love calculator</title>
</head>
<body>
    <div class="calculator">
        <div class="yourname">
            <label for=""> your name </label> <br>
            <input type="text" placeholder="your name">
        </div>

        
        <h1 class="heart">
            <p id="answer"></p>
            <i class="fa-solid fa-heart"></i></h1>
        <div class="partername">
            <label for="">parter name</label> <br>
            <input type="text" placeholder="partner name">
        </div>

        <input id="cal" type="submit"value="calculate" onclick="percentage(10,100)">
        

<script>
    function percentage(min,max){
        let result=   Math.floor((Math.random()*(max - min)) + min) + "%";
        console.log(result);
        document.getElementById("answer").innerText=result;
        
    }
</script>        
    </div>
</body>
</html>
