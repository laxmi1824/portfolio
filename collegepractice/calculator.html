<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
       body{
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
       }
       .container {
         background-color: black;
         border-radius: 20px;
         padding: 30px;
         width: 260px;
       }
       .button{
         margin-top: 80px;
         display: grid;
         grid-template-columns: repeat(4, 1fr);
         gap: 70px;
       }
       button{
         border: none;
         border-radius: 50px;
         min-height: 60px;
         width: 60px;
         font-size: 24px;
         color: whitesmoke;
         background-color: rgb(56, 42, 42);
         cursor: pointer;
         padding: 5px;
       }
       button.box{
         background-color: rgb(49, 45, 45);
         color: black;
       }
       button.colour{
         background-color: orange;
         color: white;

       }
       button.zero{
         grid-column: span 2;
         border-radius: 30px;
         width:125px;
       }
</style>
<body>
    <div class="container">
        <div class="buttons">
            <button class="box">c</button>
            <button class="box">+/-</button>
            <button class="box">%</button>
            <button class="box">/</button>
           
            <button>7</button>
            <button>8</button>
            <button>9</button>
           
            <button class="colour">×</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="colour">-</button>
            <button>1</button>
            <button>2</button>
            <button>3 </button>
            <button class="colour">+</button>
            <button class="zero">0</button>
            <button>.</button>
            <button class="colour">=</button>
           
        </div>
    </div>
</body>
</html>
