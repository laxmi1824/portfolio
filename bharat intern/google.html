<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        .logo{
            position: relative;
            width: 100px;
            height: 100px;
            border-top: 15px solid #ea4335;
            border-right: 15px solid #4295f4;
            border-bottom: 15px solid #34a853;
            border-left: 15px solid #fbbc05;
            border-radius: 50%;
            background-color: white;
        }
        .logo::before{
            content: "";
            position: absolute;
            background-color: #4285f4;
            width: 30px;
            height: 15px;
            top: 50%;
            right: -4px;
            transform: translateY(-50%);
        }
        .logo::after{
            content: "";
            position: absolute;
            width: 0;
            height: 0;
            top: -18px;
            right: -18px;
            border-top: 60px solid transparent;
            border-right: 60px solid white;
        }
    </style>
    <script>
       var a= prompt("whats your name?");
       alert(a)
    </script>
</head>
<body>
    <div class="logo"></div>
</body>
</html>
