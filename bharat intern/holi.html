<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="holi.css">
    <title>holi animation</title>
    <style>
      *{
    padding: 0;
    margin: 0;
    font-family: sans-serif;
}
body{
    background-color: black;
   
}
.container{
    text-align: center;
    position: absolute;
    top: 50;
    left: 50;
    transform: translate(-60% -60%);
    width: 100%;
    align-items: center;

}
.container span{
    color: rgb(193, 37, 37);
    font-family: cursive;
    display: block;
}
.text1{
    font-size: 60px;
    font-weight: 700;
    letter-spacing: 8px;
    margin-bottom: 20px;
    background-color: black;
    position: relative;
    animation: text 3s 1;
}
.text2{
    font-size: 40px; 
    letter-spacing: 8px;

}
@keyframes text {
    0%{
        color: rgb(173, 22, 22);
        margin-bottom: -50px;
    }
    40%{
        letter-spacing: 25px;
        margin-bottom: -50px;

    }
    85%{
        letter-spacing: 8px;
        margin-bottom: -50px;

    }
}
    
   


    </style>
</head>
<body>
 <div class="container">
   <span class="text1">HAPPY HOLI</span>
   <span class="text2">EVERYONE</span>
 </div>
</body>
</html>
