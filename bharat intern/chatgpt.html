<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holi Celebration</title>
<style>
    body {
        font-family: cursive;
        background-color: rgb(88, 0, 100);
        margin: 0;
        padding: 0;
        overflow: hidden;
    }
    .container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .color-splash {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, #0800ff, #3d044a);
        animation: colorSplash 5s ease infinite;
        margin-top: 60px;
        margin-bottom: 50px;
        justify-content: center;
    }
    @keyframes colorSplash {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(2); opacity: 0; }
    }
    .content {
        z-index: 1;
        text-align: center;
        color: rgb(107, 221, 0);
        font-weight: 700;
        letter-spacing: 8px;
        margin-bottom: 20px;
        position: relative;
        animation: text 3s 1;
        background: linear-gradient(to bottom, #0800ff, #3d044a);
        margin-top: 40PX;

    }
    h1 {
        font-size: 3em;
        margin-bottom: 20px;
        animation: text 3s 1;
        color: rgb(107, 221, 0);
        gap: 20PX;
        margin-top: 20px;
    }
   
    p1 {
        font-size: 1.5em;
        margin-bottom: 40px;
        color: rgb(107, 221, 0);
        background: linear-gradient(to bottom, #0800ff, #3d044a);
        gap: 20PX;

    }
@keyframes text {
    0%{
        color: rgb(173, 22, 22);
        margin-bottom: -40px;
    }
    40%{
        letter-spacing: 25px;
        margin-bottom: -40px;

    }
    85%{
        letter-spacing: 8px;
        margin-bottom: -40px;

    }
}  
</style>
</head>
<body>
     <div class="color-splash"></div>
        <div class="content">
            <h1>HAPPY HOLI!</h1>
             <P>EVERYONE </P>
             <p>SOAK IN THE HUES OF JOY.</p>
        </div>
    </div>
</body>
</html>
